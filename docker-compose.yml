services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: legalconnect
      POSTGRES_PASSWORD: legalconnect_dev
      POSTGRES_DB: legalconnect
    volumes:
      - postgres_data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:9-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

  docling-serve:
    image: quay.io/docling-project/docling-serve
    ports:
      - "5001:5001"
    deploy:
      resources:
        limits:
          memory: 4g

volumes:
  postgres_data:
  valkey_data:
